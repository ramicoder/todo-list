<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Manager</title>
</head>

<body>

    <header id="app-header">
        <div id="title">
            <h1>ToDo App</h1>
        </div>

        <div class="header-controls">
            <select id="workspace-selector">

            <button id="add-workspace-btn">+ New Workspace</button>
        </div>
    </header>
    <div class="non-header">
        <div id="sidebar">
        </div>

        <div id="content">
        </div>
    </div>

    

</body>

</html>
